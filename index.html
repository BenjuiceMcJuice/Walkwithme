<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Walk With Me 🌿</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f7f4; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

const STORAGE_KEY = "walk_with_me_data";

const defaultData = {
  profile: { name: "Me" },
  goal: { targetDate: "", raceName: "Half Marathon", goalMiles: 13.1 },
  walks: [],
  friends: [], // [{ id, name, importedAt, walks }]
};

const PRESET_GOALS = [
  { label: "5K", miles: 3.1 },
  { label: "10K", miles: 6.2 },
  { label: "Half Marathon", miles: 13.1 },
  { label: "Marathon", miles: 26.2 },
  { label: "Custom", miles: null },
];

// ── helpers ──────────────────────────────────────────────────────────────────

function formatDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr + "T00:00:00");
  return Math.ceil((target - today) / 86400000);
}

function walkTotalMins(w) {
  return (w.durationHours || 0) * 60 + (w.durationMins || 0);
}

function formatDuration(w) {
  const h = w.durationHours || 0;
  const m = w.durationMins || 0;
  if (!h && !m) return null;
  if (h && m) return `${h}h ${m}m`;
  if (h) return `${h}h`;
  return `${m}m`;
}

function formatPace(minsPerMile) {
  if (!minsPerMile || isNaN(minsPerMile)) return "—";
  const m = Math.floor(minsPerMile);
  const s = Math.round((minsPerMile % 1) * 60);
  return `${m}:${String(s).padStart(2,"0")}`;
}

function weekAvg(walks) {
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
  const recent = walks.filter(w => new Date(w.date + "T00:00:00") >= cutoff);
  if (!recent.length) return "0.00";
  return (recent.reduce((s,w) => s + w.miles, 0) / 7).toFixed(2);
}

function monthAvg(walks) {
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
  const recent = walks.filter(w => new Date(w.date + "T00:00:00") >= cutoff);
  if (!recent.length) return "0.00";
  return (recent.reduce((s,w) => s + w.miles, 0) / 30).toFixed(2);
}

// Compute the 6 comparison stats for any set of walks
function calcStats(walks, name) {
  const cutoff30 = new Date(); cutoff30.setDate(cutoff30.getDate() - 30);
  const walksThisMonth = walks.filter(w => new Date(w.date + "T00:00:00") >= cutoff30);
  const longest = walks.length ? Math.max(...walks.map(w => w.miles)) : null;
  const avgDistMonth = walksThisMonth.length
    ? (walksThisMonth.reduce((s,w) => s + w.miles, 0) / walksThisMonth.length).toFixed(1)
    : null;
  const timed = walks.filter(w => walkTotalMins(w) > 0 && w.miles > 0);
  const avgPace = timed.length
    ? timed.reduce((s,w) => s + (walkTotalMins(w) / w.miles), 0) / timed.length
    : null;
  return {
    name,
    totalWalks: walks.length,
    walksThisMonth: walksThisMonth.length,
    avgDistMonth,
    longest,
    avgPace,
  };
}

// ── sub-components ────────────────────────────────────────────────────────────

function MiniBarChart({ walks }) {
  const last14 = useMemo(() => {
    const days = [];
    for (let i = 13; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0,10);
      const total = walks.filter(w => w.date === key).reduce((s,w) => s+w.miles, 0);
      days.push({ label: d.toLocaleDateString("en-US",{weekday:"short"}).slice(0,1), miles: total, key });
    }
    return days;
  }, [walks]);
  const max = Math.max(...last14.map(d => d.miles), 1);
  return (
    <div style={{ display:"flex", alignItems:"flex-end", gap:"4px", height:"80px", padding:"0 4px" }}>
      {last14.map((d,i) => (
        <div key={d.key} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:"4px" }}>
          <div title={`${d.miles.toFixed(2)} mi`} style={{
            width:"100%", background: d.miles > 0 ? "#4a8c5c" : "#e8f0e9",
            borderRadius:"3px 3px 0 0", height:`${(d.miles/max)*60}px`, minHeight: d.miles > 0 ? "4px":"0",
            transition:"height 0.5s ease"
          }} />
          <span style={{ fontSize:"9px", color:"#8aa89a", fontFamily:"'Lora', serif" }}>{i%2===0?d.label:""}</span>
        </div>
      ))}
    </div>
  );
}

function MonthlyChart({ walks }) {
  const months = useMemo(() => {
    const map = {};
    walks.forEach(w => { const m = w.date.slice(0,7); map[m] = (map[m]||0) + w.miles; });
    const keys = Object.keys(map).sort().slice(-6);
    return keys.map(k => ({ label: new Date(k+"-01").toLocaleDateString("en-US",{month:"short"}), miles: map[k] }));
  }, [walks]);
  if (!months.length) return <div style={{color:"#8aa89a",textAlign:"center",padding:"20px",fontSize:"13px"}}>No walks logged yet</div>;
  const max = Math.max(...months.map(m => m.miles), 1);
  return (
    <div style={{ display:"flex", alignItems:"flex-end", gap:"8px", height:"130px", padding:"0 8px" }}>
      {months.map((m,i) => (
        <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:"6px" }}>
          <span style={{ fontSize:"10px", color:"#4a8c5c", fontFamily:"'Lora',serif", fontWeight:"600" }}>{m.miles.toFixed(1)}</span>
          <div style={{ width:"100%", background:"linear-gradient(180deg,#2d5a3d,#7ab890)", borderRadius:"4px 4px 0 0", height:`${(m.miles/max)*88}px`, minHeight:"4px", transition:"height 0.6s ease" }} />
          <span style={{ fontSize:"11px", color:"#8aa89a", fontFamily:"'Lora',serif" }}>{m.label}</span>
        </div>
      ))}
    </div>
  );
}

function LongestWalkBar({ walks }) {
  if (!walks.length) return <div style={{color:"#8aa89a",textAlign:"center",padding:"12px",fontSize:"13px"}}>No walks yet</div>;
  const sorted = [...walks].sort((a,b) => b.miles - a.miles).slice(0,5);
  const max = sorted[0].miles;
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:"12px" }}>
      {sorted.map((w,i) => (
        <div key={w.id}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"5px" }}>
            <span style={{ fontSize:"12px", color:"#2d3b2f", fontWeight: i===0 ? "700":"400" }}>{i===0 && "🏆 "}{formatDate(w.date)}</span>
            <span style={{ fontFamily:"'Lora',serif", fontSize:"13px", fontWeight:"700", color:"#2d5a3d" }}>{w.miles} mi</span>
          </div>
          <div style={{ background:"#e8f0e9", borderRadius:"4px", height:"7px", overflow:"hidden" }}>
            <div style={{ width:`${(w.miles/max)*100}%`, height:"100%", background: i===0 ? "linear-gradient(90deg,#2d5a3d,#7ab890)" : "#a8c8b0", borderRadius:"4px", transition:"width 0.6s ease" }} />
          </div>
        </div>
      ))}
    </div>
  );
}

function DurationInput({ hours, mins, onChangeHours, onChangeMins, inputStyle, labelStyle }) {
  return (
    <div>
      <label style={labelStyle}>Duration · optional</label>
      <div style={{ display:"flex", gap:"10px", marginBottom:"14px" }}>
        <div style={{ flex:1, position:"relative" }}>
          <input type="number" min="0" max="24" placeholder="0" style={{...inputStyle, marginBottom:0, paddingRight:"38px"}}
            value={hours} onChange={e => onChangeHours(e.target.value)} />
          <span style={{ position:"absolute", right:"12px", top:"50%", transform:"translateY(-50%)", fontSize:"12px", color:"#8aa89a", fontWeight:"600", pointerEvents:"none" }}>hrs</span>
        </div>
        <div style={{ flex:1, position:"relative" }}>
          <input type="number" min="0" max="59" placeholder="0" style={{...inputStyle, marginBottom:0, paddingRight:"38px"}}
            value={mins} onChange={e => onChangeMins(e.target.value)} />
          <span style={{ position:"absolute", right:"12px", top:"50%", transform:"translateY(-50%)", fontSize:"12px", color:"#8aa89a", fontWeight:"600", pointerEvents:"none" }}>min</span>
        </div>
      </div>
    </div>
  );
}

// Comparison card: one column per person
function ComparisonTable({ rows }) {
  // rows = array of stat objects
  // highlight the best value per metric
  const metrics = [
    { key:"totalWalks",      label:"Total Walks",          fmt: v => v ?? "—",         higherBetter: true },
    { key:"walksThisMonth",  label:"Walks This Month",     fmt: v => v ?? "—",         higherBetter: true },
    { key:"avgDistMonth",    label:"Avg Distance / Month", fmt: v => v ? `${v} mi` : "—", higherBetter: true },
    { key:"longest",         label:"Longest Walk",         fmt: v => v ? `${v} mi` : "—", higherBetter: true },
    { key:"avgPace",         label:"Avg Pace (min/mi)",    fmt: v => v ? formatPace(v) : "—", higherBetter: false },
  ];

  function getBest(key, higherBetter) {
    const vals = rows.map(r => r[key]).filter(v => v !== null && v !== undefined);
    if (!vals.length) return null;
    return higherBetter ? Math.max(...vals) : Math.min(...vals);
  }

  const colors = ["#2d5a3d","#7ab890","#a8c8b0","#c8dfc8","#4a8c5c"];

  return (
    <div style={{ overflowX:"auto" }}>
      <table style={{ width:"100%", borderCollapse:"collapse", fontSize:"13px" }}>
        <thead>
          <tr>
            <th style={{ textAlign:"left", padding:"8px 6px", fontSize:"11px", color:"#8aa89a", fontWeight:"600", letterSpacing:"0.5px", borderBottom:"2px solid #e8f0e9", minWidth:"110px" }}>STAT</th>
            {rows.map((r,i) => (
              <th key={i} style={{ textAlign:"center", padding:"8px 6px", borderBottom:"2px solid #e8f0e9", minWidth:"70px" }}>
                <div style={{ width:"28px", height:"28px", borderRadius:"50%", background:colors[i % colors.length],
                  display:"inline-flex", alignItems:"center", justifyContent:"center",
                  color:"white", fontWeight:"700", fontSize:"12px", marginBottom:"4px" }}>
                  {r.name.slice(0,1).toUpperCase()}
                </div>
                <div style={{ fontSize:"11px", color:"#2d3b2f", fontWeight:"700", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", maxWidth:"70px" }}>{r.name}</div>
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {metrics.map((m, mi) => {
            const best = getBest(m.key, m.higherBetter);
            return (
              <tr key={m.key} style={{ background: mi % 2 === 0 ? "#fafbfa" : "white" }}>
                <td style={{ padding:"10px 6px", color:"#8aa89a", fontSize:"11px", fontWeight:"600", textTransform:"uppercase", letterSpacing:"0.4px" }}>{m.label}</td>
                {rows.map((r,i) => {
                  const val = r[m.key];
                  const isBest = val !== null && val !== undefined && val == best;
                  return (
                    <td key={i} style={{ padding:"10px 6px", textAlign:"center" }}>
                      <span style={{
                        fontFamily:"'Lora',serif", fontWeight: isBest ? "700":"400",
                        color: isBest ? "#2d5a3d" : "#8aa89a", fontSize: isBest ? "14px":"13px",
                      }}>
                        {m.fmt(val)}
                      </span>
                      {isBest && rows.length > 1 && <span style={{ marginLeft:"3px", fontSize:"10px" }}>🌿</span>}
                    </td>
                  );
                })}
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ── main app ──────────────────────────────────────────────────────────────────

export default function App() {
  const [data, setData] = useState(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      const parsed = raw ? JSON.parse(raw) : defaultData;
      if (!parsed.friends) parsed.friends = [];
      if (!parsed.profile) parsed.profile = { name: "Me" };
      return parsed;
    } catch { return defaultData; }
  });

  const [tab, setTab] = useState("dashboard");
  const [showWalkForm, setShowWalkForm] = useState(false);
  const [showGoalForm, setShowGoalForm] = useState(false);
  const [showProfileForm, setShowProfileForm] = useState(false);
  const [editingWalk, setEditingWalk] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(false);

  const blankForm = { date: new Date().toISOString().slice(0,10), miles:"", durationHours:"", durationMins:"", comment:"" };
  const [walkForm, setWalkForm] = useState(blankForm);
  const [goalForm, setGoalForm] = useState({ targetDate: data.goal.targetDate, raceName: data.goal.raceName, goalMiles: data.goal.goalMiles || 13.1, customMiles: '' });
  const [profileName, setProfileName] = useState(data.profile?.name || "Me");

  // friends tab state
  const [importError, setImportError] = useState("");
  const [importSuccess, setImportSuccess] = useState("");
  const [confirmRemoveFriend, setConfirmRemoveFriend] = useState(null);
  const fileInputRef = useRef(null);

  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
  }, [data]);

  const days = daysUntil(data.goal.targetDate);
  const sortedWalks = [...data.walks].sort((a,b) => b.date.localeCompare(a.date));
  const goalMiles = data.goal.goalMiles || 13.1;
  const longestWalk = data.walks.length ? Math.max(...data.walks.map(w => w.miles)) : null;
  const timedWalks = data.walks.filter(w => walkTotalMins(w) > 0 && w.miles > 0);
  const avgMph = timedWalks.length
    ? (timedWalks.reduce((s,w) => s + (w.miles / (walkTotalMins(w) / 60)), 0) / timedWalks.length).toFixed(2)
    : null;
  const avgPaceMins = timedWalks.length
    ? timedWalks.reduce((s,w) => s + (walkTotalMins(w) / w.miles), 0) / timedWalks.length
    : null;

  function saveWalk() {
    if (!walkForm.miles || !walkForm.date) return;
    const walk = {
      id: editingWalk?.id || Date.now().toString(),
      date: walkForm.date,
      miles: parseFloat(walkForm.miles),
      durationHours: walkForm.durationHours ? parseInt(walkForm.durationHours) : 0,
      durationMins: walkForm.durationMins ? parseInt(walkForm.durationMins) : 0,
      comment: walkForm.comment,
    };
    setData(d => ({ ...d, walks: editingWalk ? d.walks.map(w => w.id === editingWalk.id ? walk : w) : [...d.walks, walk] }));
    setShowWalkForm(false); setEditingWalk(null); setWalkForm(blankForm);
  }

  function deleteWalk(id) {
    setData(d => ({ ...d, walks: d.walks.filter(w => w.id !== id) }));
  }

  function openEdit(walk) {
    setEditingWalk(walk); setConfirmDelete(false);
    setWalkForm({ date: walk.date, miles: walk.miles, durationHours: walk.durationHours || "", durationMins: walk.durationMins || "", comment: walk.comment || "" });
    setShowWalkForm(true);
  }

  function saveGoal() {
    const finalMiles = goalForm.goalMiles === null ? (parseFloat(goalForm.customMiles) || 13.1) : goalForm.goalMiles;
    setData(d => ({ ...d, goal: { ...d.goal, raceName: goalForm.raceName, targetDate: goalForm.targetDate, goalMiles: finalMiles } }));
    setShowGoalForm(false);
  }

  // ── Export ──
  function handleExport() {
    const payload = {
      version: 1,
      name: data.profile?.name || "Me",
      exportedAt: new Date().toISOString(),
      walks: data.walks,
    };
    const json = JSON.stringify(payload, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${(data.profile?.name || "walkwithme").replace(/\s+/g,"-").toLowerCase()}-walks.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── Import ──
  function handleImportFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    setImportError(""); setImportSuccess("");
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const payload = JSON.parse(evt.target.result);
        if (!payload.walks || !Array.isArray(payload.walks)) throw new Error("Invalid file format");
        const name = payload.name || "Friend";
        const id = Date.now().toString();
        setData(d => ({
          ...d,
          friends: [
            ...(d.friends || []).filter(f => f.name !== name),
            { id, name, importedAt: new Date().toISOString(), walks: payload.walks }
          ]
        }));
        setImportSuccess(`${name}'s data imported!`);
      } catch {
        setImportError("Couldn't read that file. Make sure it's a Walk With Me export.");
      }
      e.target.value = "";
    };
    reader.readAsText(file);
  }

  function removeFriend(id) {
    setData(d => ({ ...d, friends: d.friends.filter(f => f.id !== id) }));
    setConfirmRemoveFriend(null);
  }

  // comparison rows: me + all friends
  const comparisonRows = useMemo(() => {
    const me = calcStats(data.walks, data.profile?.name || "Me");
    const friendRows = (data.friends || []).map(f => calcStats(f.walks, f.name));
    return [me, ...friendRows];
  }, [data.walks, data.friends, data.profile]);

  // ── styles ──
  const s = {
    app: { minHeight:"100vh", background:"#f5f7f4", fontFamily:"'DM Sans', sans-serif", color:"#2d3b2f", maxWidth:"480px", margin:"0 auto", position:"relative" },
    header: { background:"linear-gradient(135deg,#2d5a3d 0%,#4a8c5c 60%,#7ab890 100%)", padding:"28px 24px 20px", color:"white" },
    headerTitle: { fontFamily:"'Lora', serif", fontSize:"22px", fontWeight:"700", letterSpacing:"-0.3px", margin:"0 0 2px" },
    headerSub: { fontSize:"13px", opacity:0.8, margin:0 },
    nav: { display:"flex", background:"white", borderBottom:"1px solid #e8ede9", position:"sticky", top:0, zIndex:10 },
    navBtn: (active) => ({
      flex:1, padding:"12px 2px", border:"none", background:"none", cursor:"pointer",
      fontSize:"10px", fontWeight:"600", letterSpacing:"0.3px", textTransform:"uppercase",
      color: active ? "#4a8c5c" : "#8aa89a",
      borderBottom: active ? "2px solid #4a8c5c" : "2px solid transparent",
      transition:"all 0.2s", fontFamily:"'DM Sans',sans-serif",
    }),
    card: { background:"white", borderRadius:"16px", padding:"20px", boxShadow:"0 2px 12px rgba(45,90,61,0.08)", margin:"0 0 12px" },
    cardTitle: { fontFamily:"'Lora',serif", fontSize:"12px", fontWeight:"600", color:"#8aa89a", textTransform:"uppercase", letterSpacing:"1px", margin:"0 0 14px" },
    statGrid: { display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px", marginBottom:"12px" },
    stat: { background:"#f5f7f4", borderRadius:"12px", padding:"14px 12px", textAlign:"center" },
    statVal: { fontFamily:"'Lora',serif", fontSize:"22px", fontWeight:"700", color:"#2d5a3d", lineHeight:1 },
    statLbl: { fontSize:"11px", color:"#8aa89a", marginTop:"4px", fontWeight:"500", lineHeight:1.3 },
    fab: { position:"fixed", bottom:"24px", right:"16px", width:"56px", height:"56px", borderRadius:"50%", background:"linear-gradient(135deg,#2d5a3d,#4a8c5c)", border:"none", color:"white", fontSize:"26px", cursor:"pointer", boxShadow:"0 4px 20px rgba(45,90,61,0.35)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100 },
    overlay: { position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:200 },
    sheet: { background:"white", borderRadius:"20px 20px 0 0", padding:"24px 24px 40px", width:"100%", maxWidth:"480px", boxShadow:"0 -8px 40px rgba(0,0,0,0.15)", animation:"slideUp 0.3s ease", maxHeight:"92vh", overflowY:"auto" },
    sheetTitle: { fontFamily:"'Lora',serif", fontSize:"18px", fontWeight:"700", color:"#2d5a3d", margin:"0 0 20px" },
    label: { fontSize:"12px", fontWeight:"600", color:"#8aa89a", letterSpacing:"0.5px", textTransform:"uppercase", display:"block", marginBottom:"6px" },
    input: { width:"100%", padding:"12px 14px", borderRadius:"10px", border:"1.5px solid #e8ede9", fontSize:"15px", fontFamily:"'DM Sans',sans-serif", color:"#2d3b2f", outline:"none", boxSizing:"border-box", marginBottom:"14px", background:"#fafbfa", transition:"border-color 0.2s" },
    btn: { width:"100%", padding:"14px", borderRadius:"12px", background:"linear-gradient(135deg,#2d5a3d,#4a8c5c)", border:"none", color:"white", fontSize:"15px", fontWeight:"700", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", letterSpacing:"0.3px" },
    btnSecondary: { width:"100%", padding:"13px", borderRadius:"12px", background:"none", border:"1.5px solid #e8ede9", color:"#8aa89a", fontSize:"14px", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", marginTop:"8px" },
    btnGreen: { width:"100%", padding:"13px", borderRadius:"12px", background:"#e8f4ec", border:"none", color:"#2d5a3d", fontSize:"14px", fontWeight:"700", cursor:"pointer", fontFamily:"'DM Sans',sans-serif" },
    walkRow: { padding:"14px 0", borderBottom:"1px solid #f0f4f1", display:"flex", gap:"12px", alignItems:"flex-start" },
    walkDot: { width:"9px", height:"9px", borderRadius:"50%", background:"#4a8c5c", marginTop:"5px", flexShrink:0 },
    badge: { display:"inline-block", padding:"2px 8px", borderRadius:"20px", background:"#e8f4ec", color:"#2d5a3d", fontSize:"11px", fontWeight:"600", marginRight:"4px" },
  };

  function WalkFormFields() {
    return (
      <>
        <label style={s.label}>Date</label>
        <input type="date" style={s.input} value={walkForm.date} onChange={e => setWalkForm(f => ({...f,date:e.target.value}))} />
        <label style={s.label}>Distance (miles)</label>
        <input type="number" step="0.01" placeholder="e.g. 2.5" style={s.input} value={walkForm.miles} onChange={e => setWalkForm(f => ({...f,miles:e.target.value}))} />
        <DurationInput hours={walkForm.durationHours} mins={walkForm.durationMins}
          onChangeHours={v => setWalkForm(f => ({...f,durationHours:v}))}
          onChangeMins={v => setWalkForm(f => ({...f,durationMins:v}))}
          inputStyle={s.input} labelStyle={s.label} />
        <label style={s.label}>Notes · optional</label>
        <textarea placeholder="How did it feel? Any details..." rows={3} style={{...s.input, resize:"none"}}
          value={walkForm.comment} onChange={e => setWalkForm(f => ({...f,comment:e.target.value}))} />
      </>
    );
  }

  return (
    <div style={s.app}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');
        @keyframes slideUp { from { transform: translateY(30px); opacity:0 } to { transform: translateY(0); opacity:1 } }
        input:focus { border-color: #4a8c5c !important; background: white !important; }
        textarea:focus { border-color: #4a8c5c !important; background: white !important; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
      `}</style>

      {/* Header */}
      <div style={s.header}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
          <div>
            <h1 style={s.headerTitle}>🌿 Walk With Me</h1>
            <p style={s.headerSub}>
              {data.goal.raceName}{data.goal.targetDate ? ` · ${formatDate(data.goal.targetDate)}` : " · Set your race date →"}
            </p>
          </div>
          <div style={{ display:"flex", gap:"6px", flexShrink:0 }}>
            <button onClick={() => { setProfileName(data.profile?.name || "Me"); setShowProfileForm(true); }}
              style={{ background:"rgba(255,255,255,0.2)", border:"none", color:"white", borderRadius:"8px", padding:"6px 10px", fontSize:"12px", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", fontWeight:"600" }}>
              👤 {data.profile?.name || "Me"}
            </button>
            <button onClick={() => { setGoalForm({ targetDate: data.goal.targetDate, raceName: data.goal.raceName, goalMiles: data.goal.goalMiles || 13.1, customMiles: '' }); setShowGoalForm(true); }}
              style={{ background:"rgba(255,255,255,0.2)", border:"none", color:"white", borderRadius:"8px", padding:"6px 10px", fontSize:"12px", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", fontWeight:"600" }}>
              🎯
            </button>
          </div>
        </div>
        {days !== null && (
          <div style={{ marginTop:"14px", background:"rgba(255,255,255,0.15)", borderRadius:"12px", padding:"10px 16px", display:"inline-flex", alignItems:"baseline", gap:"6px" }}>
            <span style={{ fontSize:"30px", fontWeight:"700", fontFamily:"'Lora',serif" }}>{Math.max(days, 0)}</span>
            <span style={{ fontSize:"13px", opacity:0.9 }}>{days === 1 ? "day" : "days"} to race day</span>
          </div>
        )}
      </div>

      {/* Nav */}
      <div style={s.nav}>
        {[["dashboard","Dashboard"],["log","Log Walk"],["history","History"],["charts","Charts"],["friends","Friends"]].map(([id,lbl]) => (
          <button key={id} style={s.navBtn(tab===id)} onClick={() => setTab(id)}>{lbl}</button>
        ))}
      </div>

      <div style={{ padding:"16px 16px 100px" }}>

        {/* ── DASHBOARD ── */}
        {tab === "dashboard" && (
          <>
            <div style={s.statGrid}>
              <div style={{...s.stat, gridColumn:"1/-1", display:"flex", alignItems:"center", gap:"16px", textAlign:"left", padding:"18px 20px", background:"#f0f7f2"}}>
                <span style={{ fontSize:"38px", lineHeight:1 }}>🥾</span>
                <div>
                  <div style={{ fontSize:"11px", color:"#8aa89a", fontWeight:"600", textTransform:"uppercase", letterSpacing:"0.8px" }}>Longest Walk So Far</div>
                  <div style={{ fontFamily:"'Lora',serif", fontSize:"34px", fontWeight:"700", color:"#2d5a3d", lineHeight:1.1 }}>
                    {longestWalk !== null ? `${longestWalk} mi` : "No walks yet"}
                  </div>
                  {longestWalk !== null && (
                    <div style={{ fontSize:"12px", color:"#8aa89a", marginTop:"3px" }}>
                      {(goalMiles - longestWalk) > 0 ? `${(goalMiles - longestWalk).toFixed(1)} mi still to go to reach ${goalMiles}` : `You've hit your ${data.goal.raceName} distance!`}
                    </div>
                  )}
                </div>
              </div>
              <div style={s.stat}><div style={s.statVal}>{weekAvg(data.walks)}</div><div style={s.statLbl}>mi/day avg<br/>last 7 days</div></div>
              <div style={s.stat}><div style={s.statVal}>{monthAvg(data.walks)}</div><div style={s.statLbl}>mi/day avg<br/>last 30 days</div></div>
              <div style={s.stat}><div style={s.statVal}>{avgMph ?? "—"}</div><div style={s.statLbl}>avg speed<br/>(mph)</div></div>
              <div style={s.stat}><div style={s.statVal}>{avgPaceMins ? formatPace(avgPaceMins) : "—"}</div><div style={s.statLbl}>avg pace<br/>(min / mi)</div></div>
            </div>
            <div style={s.card}>
              <div style={s.cardTitle}>Last 14 Days</div>
              <MiniBarChart walks={data.walks} />
            </div>
            <div style={s.card}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" }}>
                <div style={s.cardTitle}>Recent Walks</div>
                <button onClick={() => setTab("history")} style={{ fontSize:"12px", color:"#4a8c5c", background:"none", border:"none", cursor:"pointer", fontWeight:"600" }}>See all →</button>
              </div>
              {sortedWalks.slice(0,3).length === 0 ? (
                <div style={{ color:"#8aa89a", fontSize:"13px", textAlign:"center", padding:"16px" }}>No walks yet — tap + to log your first one!</div>
              ) : sortedWalks.slice(0,3).map(w => {
                const dur = formatDuration(w);
                const mins = walkTotalMins(w);
                const mph = mins > 0 ? (w.miles / (mins / 60)).toFixed(1) : null;
                return (
                  <div key={w.id} style={s.walkRow}>
                    <div style={s.walkDot} />
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", justifyContent:"space-between" }}>
                        <span style={{ fontWeight:"600", fontSize:"14px" }}>{formatDate(w.date)}</span>
                        <span style={{ fontFamily:"'Lora',serif", fontWeight:"700", color:"#2d5a3d", fontSize:"15px" }}>{w.miles} mi</span>
                      </div>
                      <div style={{ marginTop:"4px" }}>
                        {dur && <span style={s.badge}>{dur}</span>}
                        {mph && <span style={s.badge}>{mph} mph</span>}
                      </div>
                      {w.comment && <div style={{ fontSize:"12px", color:"#8aa89a", marginTop:"3px" }}>{w.comment}</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        )}

        {/* ── LOG WALK ── */}
        {tab === "log" && (
          <div style={s.card}>
            <div style={s.sheetTitle}>Log a Walk</div>
            <WalkFormFields />
            <button style={s.btn} onClick={saveWalk}>Save Walk 🌿</button>
            <button style={s.btnSecondary} onClick={() => setWalkForm(blankForm)}>Clear</button>
          </div>
        )}

        {/* ── HISTORY ── */}
        {tab === "history" && (
          <div style={s.card}>
            <div style={s.cardTitle}>Walk History · {sortedWalks.length} walks</div>
            {sortedWalks.length === 0 ? (
              <div style={{ color:"#8aa89a", fontSize:"13px", textAlign:"center", padding:"24px" }}>No walks logged yet!</div>
            ) : sortedWalks.map(w => {
              const dur = formatDuration(w);
              const mins = walkTotalMins(w);
              const mph = mins > 0 ? (w.miles / (mins/60)).toFixed(2) : null;
              const pace = mins > 0 ? formatPace(mins / w.miles) : null;
              return (
                <div key={w.id} style={s.walkRow}>
                  <div style={s.walkDot} />
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                      <div style={{ flex:1 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:"8px", flexWrap:"wrap" }}>
                          <span style={{ fontWeight:"600", fontSize:"14px" }}>{formatDate(w.date)}</span>
                          <span style={{ fontFamily:"'Lora',serif", fontWeight:"700", color:"#2d5a3d", fontSize:"14px" }}>{w.miles} mi</span>
                        </div>
                        <div style={{ marginTop:"5px", display:"flex", flexWrap:"wrap", gap:"2px" }}>
                          {dur && <span style={s.badge}>{dur}</span>}
                          {mph && <span style={s.badge}>{mph} mph</span>}
                          {pace && <span style={s.badge}>{pace}/mi</span>}
                        </div>
                        {w.comment && <div style={{ fontSize:"12px", color:"#8aa89a", marginTop:"4px" }}>{w.comment}</div>}
                      </div>
                      <button onClick={() => openEdit(w)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:"16px", marginLeft:"8px", flexShrink:0 }}>✏️</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── CHARTS ── */}
        {tab === "charts" && (
          <>
            <div style={s.card}><div style={s.cardTitle}>Monthly Miles</div><MonthlyChart walks={data.walks} /></div>
            <div style={s.card}><div style={s.cardTitle}>Top 5 Longest Walks</div><LongestWalkBar walks={data.walks} /></div>
            <div style={s.card}>
              <div style={s.cardTitle}>Speed & Pace Breakdown</div>
              {!timedWalks.length ? (
                <div style={{ color:"#8aa89a", fontSize:"13px", textAlign:"center", padding:"12px" }}>Log walk durations to unlock speed & pace stats</div>
              ) : (
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px" }}>
                  <div style={{...s.stat, gridColumn:"1/-1"}}>
                    <div style={s.statVal}>{avgMph} mph</div>
                    <div style={s.statLbl}>average speed</div>
                    <div style={{ fontSize:"11px", color:"#4a8c5c", marginTop:"6px" }}>
                      At this pace, {goalMiles} mi ≈ {Math.floor(goalMiles/parseFloat(avgMph))}h {Math.round((goalMiles/parseFloat(avgMph)%1)*60)}m
                    </div>
                  </div>
                  <div style={s.stat}><div style={s.statVal}>{formatPace(avgPaceMins)}</div><div style={s.statLbl}>avg pace (min/mi)</div></div>
                  <div style={s.stat}><div style={s.statVal}>{Math.max(...timedWalks.map(w => parseFloat((w.miles/(walkTotalMins(w)/60)).toFixed(2))))} </div><div style={s.statLbl}>fastest walk (mph)</div></div>
                  <div style={s.stat}><div style={s.statVal}>{(data.walks.reduce((s,w)=>s+w.miles,0)/data.walks.length).toFixed(1)}</div><div style={s.statLbl}>avg walk (mi)</div></div>
                  <div style={s.stat}><div style={s.statVal}>{data.walks.length}</div><div style={s.statLbl}>total walks</div></div>
                </div>
              )}
            </div>
          </>
        )}

        {/* ── FRIENDS ── */}
        {tab === "friends" && (
          <>
            {/* Export */}
            <div style={s.card}>
              <div style={s.cardTitle}>Share Your Data</div>
              <p style={{ fontSize:"13px", color:"#8aa89a", margin:"0 0 14px", lineHeight:1.5 }}>
                Export your walk history as a file and send it to friends via WhatsApp or Messages. They can import it to compare stats with you.
              </p>
              <button style={s.btnGreen} onClick={handleExport}>
                📤 Export My Walks
              </button>
            </div>

            {/* Import */}
            <div style={s.card}>
              <div style={s.cardTitle}>Import a Friend</div>
              <p style={{ fontSize:"13px", color:"#8aa89a", margin:"0 0 14px", lineHeight:1.5 }}>
                When a friend sends you their export file, tap below to import and compare.
              </p>
              {importError && <div style={{ background:"#fff0f0", border:"1px solid #f0d0d0", borderRadius:"8px", padding:"10px 12px", fontSize:"13px", color:"#c0504a", marginBottom:"12px" }}>{importError}</div>}
              {importSuccess && <div style={{ background:"#e8f4ec", border:"1px solid #c8e0cc", borderRadius:"8px", padding:"10px 12px", fontSize:"13px", color:"#2d5a3d", fontWeight:"600", marginBottom:"12px" }}>✅ {importSuccess}</div>}
              <input ref={fileInputRef} type="file" accept=".json" style={{ display:"none" }} onChange={handleImportFile} />
              <button style={s.btnGreen} onClick={() => { setImportError(""); setImportSuccess(""); fileInputRef.current?.click(); }}>
                📥 Import Friend's File
              </button>
            </div>

            {/* Friends list */}
            {(data.friends || []).length > 0 && (
              <div style={s.card}>
                <div style={s.cardTitle}>Imported Friends</div>
                {(data.friends || []).map(f => (
                  <div key={f.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 0", borderBottom:"1px solid #f0f4f1" }}>
                    <div>
                      <div style={{ fontWeight:"600", fontSize:"14px" }}>{f.name}</div>
                      <div style={{ fontSize:"11px", color:"#8aa89a" }}>{f.walks.length} walks · imported {formatDate(f.importedAt?.slice(0,10))}</div>
                    </div>
                    {confirmRemoveFriend === f.id ? (
                      <div style={{ display:"flex", gap:"6px" }}>
                        <button onClick={() => setConfirmRemoveFriend(null)} style={{ padding:"5px 10px", borderRadius:"8px", border:"1px solid #e8ede9", background:"none", color:"#8aa89a", fontSize:"12px", cursor:"pointer" }}>Cancel</button>
                        <button onClick={() => removeFriend(f.id)} style={{ padding:"5px 10px", borderRadius:"8px", border:"none", background:"#c0504a", color:"white", fontSize:"12px", cursor:"pointer", fontWeight:"600" }}>Remove</button>
                      </div>
                    ) : (
                      <button onClick={() => setConfirmRemoveFriend(f.id)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:"16px" }}>🗑️</button>
                    )}
                  </div>
                ))}
              </div>
            )}

            {/* Comparison table */}
            <div style={s.card}>
              <div style={s.cardTitle}>
                Group Comparison {comparisonRows.length > 1 ? `· ${comparisonRows.length} walkers` : ""}
              </div>
              {comparisonRows.length === 1 ? (
                <div style={{ color:"#8aa89a", fontSize:"13px", textAlign:"center", padding:"12px" }}>
                  Import a friend's data above to compare stats 🌿
                </div>
              ) : (
                <ComparisonTable rows={comparisonRows} />
              )}
            </div>
          </>
        )}
      </div>

      {/* FAB */}
      {tab !== "log" && (
        <button style={s.fab} onClick={() => { setEditingWalk(null); setWalkForm(blankForm); setShowWalkForm(true); }}>+</button>
      )}

      {/* Walk modal */}
      {showWalkForm && (
        <div style={s.overlay} onClick={e => e.target===e.currentTarget && setShowWalkForm(false)}>
          <div style={s.sheet}>
            <h2 style={s.sheetTitle}>{editingWalk ? "Edit Walk" : "Log a Walk"}</h2>
            <WalkFormFields />
            <button style={s.btn} onClick={saveWalk}>{editingWalk ? "Save Changes" : "Save Walk 🌿"}</button>
            <button style={s.btnSecondary} onClick={() => { setShowWalkForm(false); setEditingWalk(null); }}>Cancel</button>
            {editingWalk && !confirmDelete && (
              <button onClick={() => setConfirmDelete(true)}
                style={{ width:"100%", padding:"13px", borderRadius:"12px", background:"none", border:"1.5px solid #f0d0d0", color:"#c0504a", fontSize:"14px", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", marginTop:"8px", fontWeight:"600" }}>
                🗑️ Delete this walk
              </button>
            )}
            {editingWalk && confirmDelete && (
              <div style={{ marginTop:"8px", background:"#fff5f5", borderRadius:"12px", padding:"14px", border:"1.5px solid #f0d0d0" }}>
                <div style={{ fontSize:"13px", color:"#c0504a", fontWeight:"600", marginBottom:"10px", textAlign:"center" }}>Are you sure? This can't be undone.</div>
                <div style={{ display:"flex", gap:"8px" }}>
                  <button onClick={() => setConfirmDelete(false)} style={{ flex:1, padding:"10px", borderRadius:"10px", background:"none", border:"1.5px solid #e8ede9", color:"#8aa89a", fontSize:"13px", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", fontWeight:"600" }}>Cancel</button>
                  <button onClick={() => { deleteWalk(editingWalk.id); setShowWalkForm(false); setEditingWalk(null); setConfirmDelete(false); }}
                    style={{ flex:1, padding:"10px", borderRadius:"10px", background:"#c0504a", border:"none", color:"white", fontSize:"13px", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", fontWeight:"700" }}>Yes, delete</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* Profile modal */}
      {showProfileForm && (
        <div style={s.overlay} onClick={e => e.target===e.currentTarget && setShowProfileForm(false)}>
          <div style={s.sheet}>
            <h2 style={s.sheetTitle}>Your Name</h2>
            <p style={{ fontSize:"13px", color:"#8aa89a", margin:"0 0 16px" }}>This name appears in friend comparisons when you export your data.</p>
            <label style={s.label}>Display Name</label>
            <input type="text" style={s.input} placeholder="e.g. Sarah" value={profileName} onChange={e => setProfileName(e.target.value)} />
            <button style={s.btn} onClick={() => { setData(d => ({ ...d, profile: { ...d.profile, name: profileName } })); setShowProfileForm(false); }}>Save</button>
            <button style={s.btnSecondary} onClick={() => setShowProfileForm(false)}>Cancel</button>
          </div>
        </div>
      )}

      {/* Goal modal */}
      {showGoalForm && (
        <div style={s.overlay} onClick={e => e.target===e.currentTarget && setShowGoalForm(false)}>
          <div style={s.sheet}>
            <h2 style={s.sheetTitle}>Race Goal</h2>
            <label style={s.label}>Race Type</label>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px", marginBottom:"14px" }}>
              {PRESET_GOALS.map(p => {
                const isSelected = p.miles === null ? goalForm.goalMiles === null : goalForm.goalMiles === p.miles;
                return (
                  <button key={p.label}
                    onClick={() => setGoalForm(f => ({ ...f, goalMiles: p.miles, raceName: p.miles !== null ? p.label : f.raceName }))}
                    style={{ padding:"10px 8px", borderRadius:"10px", border:"1.5px solid", borderColor: isSelected ? "#4a8c5c" : "#e8ede9", background: isSelected ? "#e8f4ec" : "#fafbfa", color: isSelected ? "#2d5a3d" : "#8aa89a", fontWeight: isSelected ? "700" : "500", fontSize:"13px", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", transition:"all 0.15s" }}>
                    <div>{p.label}</div>
                    {p.miles !== null && <div style={{ fontSize:"11px", opacity:0.7, marginTop:"2px" }}>{p.miles} mi</div>}
                  </button>
                );
              })}
            </div>
            {goalForm.goalMiles === null && (
              <>
                <label style={s.label}>Custom Distance (miles)</label>
                <input type="number" step="0.1" placeholder="e.g. 10.0" style={s.input} value={goalForm.customMiles} onChange={e => setGoalForm(f => ({...f, customMiles: e.target.value}))} />
                <label style={s.label}>Event Name</label>
                <input type="text" style={s.input} value={goalForm.raceName} onChange={e => setGoalForm(f => ({...f,raceName:e.target.value}))} placeholder="e.g. My Big Walk" />
              </>
            )}
            <label style={s.label}>Target Date</label>
            <input type="date" style={s.input} value={goalForm.targetDate} onChange={e => setGoalForm(f => ({...f,targetDate:e.target.value}))} />
            <button style={s.btn} onClick={saveGoal}>Save Goal 🎯</button>
            <button style={s.btnSecondary} onClick={() => setShowGoalForm(false)}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
